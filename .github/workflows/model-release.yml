name: Rill model-only release

on:
  push:
    tags:
      - "model-v*.*.*"

permissions:
  contents: write

concurrency:
  group: rill-model-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PUBLISHER_KEY_ID: mira-plugins-2026-001
  RILL_PUBLIC_KEY_HEX: eb80fdde2dc7ba507b6c8afbbf5a7de82e6219967edf1914ddb979d5601d39b3

jobs:
  publish-model:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
      - name: Validate model-only version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#model-v}"
          manifest_version="$(python3 -c 'import json; print(json.load(open("models/mira-battery-default/manifest.json"))["version"])')"
          test "$manifest_version" = "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build signing tool
        run: cargo build --locked --release -p rill-runtime --bin rill-pack
      - name: Create signed model package
        env:
          RILL_SIGNING_KEY_HEX: ${{ secrets.RILL_SIGNING_KEY_HEX }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RILL_SIGNING_KEY_HEX"
          mkdir -p dist
          target/release/rill-pack create \
            --manifest models/mira-battery-default/manifest.json \
            --model models/mira-battery-default/model.json \
            --output "dist/mira-battery-default-${VERSION}.rillpack"
      - name: Download and verify current stable index
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download local-ai-stable --pattern stable-index.json --dir dist
          target/release/rill-pack verify-index \
            --index dist/stable-index.json \
            --key-id "$PUBLISHER_KEY_ID" \
            --public-key-hex "$RILL_PUBLIC_KEY_HEX"
      - name: Replace only the model entry and re-sign
        env:
          RILL_SIGNING_KEY_HEX: ${{ secrets.RILL_SIGNING_KEY_HEX }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          asset="mira-battery-default-${VERSION}.rillpack"
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python3 scripts/update-model-release-index.py \
            --signed-index dist/stable-index.json \
            --model "dist/${asset}" \
            --model-id mira.battery.default \
            --version "$VERSION" \
            --url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${asset}" \
            --publisher-key-id "$PUBLISHER_KEY_ID" \
            --generated-at "$generated_at" \
            --output dist/next-index-payload.json
          target/release/rill-pack sign-index \
            --payload dist/next-index-payload.json \
            --output dist/next-stable-index.json
      - name: Verify model and next index
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          target/release/rill-pack verify \
            --pack "dist/mira-battery-default-${VERSION}.rillpack" \
            --key-id "$PUBLISHER_KEY_ID" \
            --public-key-hex "$RILL_PUBLIC_KEY_HEX"
          target/release/rill-pack verify-index \
            --index dist/next-stable-index.json \
            --key-id "$PUBLISHER_KEY_ID" \
            --public-key-hex "$RILL_PUBLIC_KEY_HEX"
      - name: Publish immutable model release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "dist/mira-battery-default-${VERSION}.rillpack" \
            dist/next-stable-index.json \
            --verify-tag \
            --title "Rill battery model ${VERSION}" \
            --generate-notes
      - name: Advance signed stable-index asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cp dist/next-stable-index.json dist/stable-index.json
          gh release upload local-ai-stable dist/stable-index.json --clobber
