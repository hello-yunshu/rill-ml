name: Security audit

on:
  push:
    branches: [main, master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "crates/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main, master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "crates/**"
      - ".github/workflows/**"
  schedule:
    - cron: "17 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write
  security-events: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: rust, actions
      - uses: github/codeql-action/analyze@v4

  audit:
    name: RustSec advisory audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # RustSec audit-check v2.0.0, pinned to the release commit.
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
