name: Security audit

on:
  push:
    branches: [main, master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main, master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "17 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: RustSec advisory audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # RustSec audit-check v2.0.0, pinned to the release commit.
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
