name: CI / Release
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Release {0}', inputs.tag) || 'CI' }}

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish (e.g. v0.7.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  PUBLISHER_KEY_ID: rillml-examples-2026-001
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  RILL_PUBLIC_KEY_HEX: 29fd1fc2f22bd7e405aec167ff0a0d8de791f011c415075d4c5f9f64fd93fc2e

# ─────────────────────────────────────────────────────────────────────────────
# CI jobs — run on push (branches) and pull_request, never on workflow_dispatch.
# Release jobs — run only on workflow_dispatch (auto-release dispatches them
# after CI succeeds; the tag-push trigger is intentionally omitted to avoid
# duplicate runs).
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  fmt:
    name: cargo fmt
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --locked --workspace --all-targets --all-features --exclude rill-ml-python -- -D warnings

  test:
    name: test (${{ matrix.os }}, ${{ matrix.rust }})
    if: github.event_name != 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo check workspace
        run: cargo check --locked --workspace --all-targets --all-features
      - name: cargo test workspace
        run: cargo test --locked --workspace --all-targets --all-features --exclude rill-ml-python
      - name: cargo test docs
        run: cargo test --locked --workspace --doc --all-features --exclude rill-ml-python

  msrv:
    name: MSRV (1.94) lib check
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust 1.94.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo +1.94 check rill-ml --lib
        run: cargo +1.94.0 check --locked --lib
      - name: cargo +1.94 check rill-ml --lib --features serde
        run: cargo +1.94.0 check --locked --lib --features serde
      - name: cargo +1.94 check rill-handler-api
        run: cargo +1.94.0 check --locked -p rill-handler-api
      - name: cargo +1.94 check rill-runtime-protocol
        run: cargo +1.94.0 check --locked -p rill-runtime-protocol
      - name: cargo +1.94 check rill-runtime (default features)
        run: cargo +1.94.0 check --locked -p rill-runtime
      - name: cargo +1.94 check rill-runtime (wasm feature)
        run: cargo +1.94.0 check --locked -p rill-runtime --features wasm

  doc:
    name: cargo doc
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc --features serde --no-deps
        run: cargo doc --locked --features serde --no-deps

  release-index-helpers:
    name: release-index helper tests
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Verify model/runtime index update behavior
        run: python3 -m unittest discover -s scripts/tests -v

  wasm-build:
    name: WASM build + test
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked -p rill-ml-wasm --target wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: wasm-pack test (--node)
        run: cd crates/rill-ml-wasm && wasm-pack test --node --release

  wasm-handler:
    name: WASM handler component build + test
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-tools
        run: cargo install wasm-tools --locked
      - name: Build echo handler component
        run: |
          cd handlers/echo-handler
          cargo build --release --target wasm32-unknown-unknown
          mkdir -p ../../target
          wasm-tools component new \
            target/wasm32-unknown-unknown/release/echo-handler.wasm \
            -o ../../target/echo-handler.wasm
      - name: Build malicious test handler component
        run: |
          cd handlers/test-malicious-handler
          cargo build --release --target wasm32-unknown-unknown
          wasm-tools component new \
            target/wasm32-unknown-unknown/release/test-malicious-handler.wasm \
            -o ../../target/test-malicious-handler.wasm
      - name: Run WASM handler integration tests
        env:
          ECHO_HANDLER_WASM: ${{ github.workspace }}/target/echo-handler.wasm
          MALICIOUS_HANDLER_WASM: ${{ github.workspace }}/target/test-malicious-handler.wasm
        run: cargo test --locked -p rill-runtime --features wasm --test wasm_handler -- --include-ignored
      - name: Run runtime process integration tests (with WASM)
        env:
          ECHO_HANDLER_WASM: ${{ github.workspace }}/target/echo-handler.wasm
        run: cargo test --locked -p rill-runtime --features wasm --test runtime_process

  python-build:
    name: Python bindings build + pytest
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build and test Python bindings
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install maturin pytest
          cd crates/rill-ml-python
          maturin develop --release
          pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────
  # Release jobs — only on workflow_dispatch.
  # Auto Release dispatches this workflow after CI passes; the tag-push
  # trigger is intentionally omitted so retries are idempotent.
  # ─────────────────────────────────────────────────────────────────────────

  package-check:
    name: cargo package dry-run
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo package --workspace --exclude rill-ml-python
      - run: cargo package --features serde
      - run: cargo publish --dry-run --features serde

  build-runtime:
    name: Runtime ${{ matrix.target_os }} ${{ matrix.target_arch }}
    if: github.event_name == 'workflow_dispatch'
    needs: package-check
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            target_os: linux
            target_arch: x86_64
            extension: ""
          - runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            target_os: windows
            target_arch: x86_64
            extension: .exe
          - runner: macos-14
            rust_target: aarch64-apple-darwin
            target_os: macos
            target_arch: aarch64
            extension: ""
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: runtime-${{ matrix.rust_target }}
      - name: Build runtime (with wasm feature for handler support)
        run: cargo build --locked --release --target ${{ matrix.rust_target }} -p rill-runtime --bin rill-runtime --features wasm
      - name: Import Apple Developer ID certificate
        if: matrix.target_os == 'macos'
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -uo pipefail
          if [ -z "${APPLE_CERTIFICATE_P12_BASE64:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "Apple Developer ID secrets not configured — skipping codesign"
            exit 0
          fi
          set -e
          python3 - <<'PY'
          import base64, os, pathlib
          pathlib.Path("certificate.p12").write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE_P12_BASE64"]))
          PY
          security create-keychain -p "${RUNNER_TEMP}" rill-signing.keychain-db
          security set-keychain-settings -lut 21600 rill-signing.keychain-db
          security unlock-keychain -p "${RUNNER_TEMP}" rill-signing.keychain-db
          security import certificate.p12 -k rill-signing.keychain-db -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s rill-signing.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${RUNNER_TEMP}" rill-signing.keychain-db
      - name: Code-sign macOS runtime
        if: matrix.target_os == 'macos'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -uo pipefail
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "Skipping codesign — no Apple signing identity"
            exit 0
          fi
          set -e
          codesign --force --timestamp --options runtime --sign "$APPLE_SIGNING_IDENTITY" "target/${{ matrix.rust_target }}/release/rill-runtime"
          codesign --verify --strict --verbose=2 "target/${{ matrix.rust_target }}/release/rill-runtime"
      - name: Stage asset
        shell: python
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          TARGET: ${{ matrix.rust_target }}
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
          EXTENSION: ${{ matrix.extension }}
        run: |
          import os, pathlib, shutil
          version = os.environ["VERSION"].removeprefix("v")
          extension = os.environ["EXTENSION"]
          source = pathlib.Path("target") / os.environ["TARGET"] / "release" / f"rill-runtime{extension}"
          output = pathlib.Path("dist") / f"rill-runtime-{version}-{os.environ['TARGET_OS']}-{os.environ['TARGET_ARCH']}{extension}"
          output.parent.mkdir(exist_ok=True)
          shutil.copyfile(source, output)
      - uses: actions/upload-artifact@v7
        with:
          name: runtime-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist/rill-runtime-*
          if-no-files-found: error

  publish:
    name: Sign and publish
    if: github.event_name == 'workflow_dispatch'
    needs: build-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          targets: wasm32-unknown-unknown
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="${RELEASE_TAG#v}"
          test "$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)" = "$version"
          test "$(python3 -c 'import json; print(json.load(open("models/example-default/manifest.json"))["version"])')" = "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build signing tool
        run: cargo build --locked --release -p rill-runtime --bin rill-pack
      - name: Publish to crates.io
        if: startsWith(env.RELEASE_TAG, 'v')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in rill-handler-api rill-runtime-protocol rill-ml rill-runtime rill-ml-tokio rill-ml-arrow rill-ml-polars rillml-inspect rill-ml-wasm; do
            published=false
            for attempt in {1..10}; do
              if output=$(cargo publish -p "$crate" --no-verify 2>&1); then
                echo "$output"
                published=true
                break
              fi
              if echo "$output" | grep -q "already exists"; then
                echo "$crate already published, continuing"
                published=true
                break
              elif echo "$output" | grep -Eq "failed to select a version|no matching package named" && [ "$attempt" -lt 10 ]; then
                echo "Waiting for crates.io to index dependencies before publishing $crate (attempt $attempt/10)"
                sleep 15
              else
                echo "$output"
                exit 1
              fi
            done
            if [ "$published" != true ]; then
              echo "Timed out waiting to publish $crate"
              exit 1
            fi
          done
      - name: Verify existing stable index when present
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release download local-ai-stable --pattern stable-index.json --dir dist; then
            mv dist/stable-index.json dist/current-stable-index.json
            if ! target/release/rill-pack verify-index \
              --index dist/current-stable-index.json \
              --key-id "$PUBLISHER_KEY_ID" \
              --public-key-hex "$RILL_PUBLIC_KEY_HEX"; then
              echo "::warning::Existing stable index could not be verified (possibly incompatible schema). Treating as fresh release."
              rm -f dist/current-stable-index.json
            fi
          fi
      - name: Reuse immutable versioned assets when present
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release download "$RELEASE_TAG" \
              --pattern 'rill-runtime-*' \
              --pattern '*.rillpack' \
              --pattern '*.rillhandler' \
              --dir dist \
              --clobber
            mkdir -p dist/versioned-release
            gh release download "$RELEASE_TAG" \
              --pattern stable-index.json \
              --dir dist/versioned-release \
              --clobber
            if target/release/rill-pack verify-index \
              --index dist/versioned-release/stable-index.json \
              --key-id "$PUBLISHER_KEY_ID" \
              --public-key-hex "$RILL_PUBLIC_KEY_HEX"; then
              python3 scripts/verify-release-assets.py \
                --index dist/versioned-release/stable-index.json \
                --release-dir dist \
                --version "$VERSION"
            else
              echo "::warning::Versioned stable-index could not be verified (possibly incompatible schema). Skipping asset-matching check; individual assets are still verified in the next step."
            fi
          fi
      - name: Create signed model package
        env:
          RILL_SIGNING_KEY_HEX: ${{ secrets.RILL_SIGNING_KEY_HEX }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RILL_SIGNING_KEY_HEX"
          if [ ! -f "dist/example-default-${VERSION}.rillpack" ]; then
            target/release/rill-pack create \
              --manifest models/example-default/manifest.json \
              --model models/example-default/model.json \
              --output "dist/example-default-${VERSION}.rillpack"
          fi
      - name: Install wasm-tools
        run: cargo install wasm-tools --locked
      - name: Build and sign echo handler package
        env:
          RILL_SIGNING_KEY_HEX: ${{ secrets.RILL_SIGNING_KEY_HEX }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RILL_SIGNING_KEY_HEX"
          if [ ! -f "dist/echo-handler-${VERSION}.rillhandler" ]; then
            cd handlers/echo-handler
            cargo build --release --target wasm32-unknown-unknown
            mkdir -p ../../target
            wasm-tools component new \
              target/wasm32-unknown-unknown/release/echo-handler.wasm \
              -o ../../target/echo-handler.wasm
            cd ../..
            target/release/rill-pack create-handler \
              --manifest handlers/echo-handler/manifest.json \
              --module target/echo-handler.wasm \
              --output "dist/echo-handler-${VERSION}.rillhandler"
          fi
      - name: Build and sign stable index
        env:
          RILL_SIGNING_KEY_HEX: ${{ secrets.RILL_SIGNING_KEY_HEX }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          extra=()
          if [ -f dist/current-stable-index.json ]; then
            extra+=(--existing-index dist/current-stable-index.json)
          fi
          python3 scripts/build-release-index.py \
            --release-dir dist \
            --version "$VERSION" \
            --tag "$RELEASE_TAG" \
            --repository "$GITHUB_REPOSITORY" \
            --publisher-key-id "$PUBLISHER_KEY_ID" \
            --generated-at "$generated_at" \
            --output dist/stable-index-payload.json \
            "${extra[@]}"
          target/release/rill-pack sign-index \
            --payload dist/stable-index-payload.json \
            --output dist/stable-index.json
      - name: Verify signed outputs before publishing
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          target/release/rill-pack verify \
            --pack "dist/example-default-${VERSION}.rillpack" \
            --key-id "$PUBLISHER_KEY_ID" \
            --public-key-hex "$RILL_PUBLIC_KEY_HEX"
          target/release/rill-pack inspect-handler \
            --handler "dist/echo-handler-${VERSION}.rillhandler" \
            --key-id "$PUBLISHER_KEY_ID" \
            --public-key-hex "$RILL_PUBLIC_KEY_HEX"
          target/release/rill-pack verify-index \
            --index dist/stable-index.json \
            --key-id "$PUBLISHER_KEY_ID" \
            --public-key-hex "$RILL_PUBLIC_KEY_HEX"
      - name: Publish immutable versioned release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            mapfile -t existing_assets < <(
              gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name'
            )
            for asset in dist/rill-runtime-* dist/*.rillpack dist/*.rillhandler dist/stable-index.json; do
              name="$(basename "$asset")"
              present=false
              for existing in "${existing_assets[@]}"; do
                if [ "$existing" = "$name" ]; then
                  present=true
                  break
                fi
              done
              if [ "$present" = true ]; then
                echo "Preserving immutable asset $name"
              else
                gh release upload "$RELEASE_TAG" "$asset"
              fi
            done
          else
            gh release create "$RELEASE_TAG" dist/rill-runtime-* dist/*.rillpack dist/*.rillhandler dist/stable-index.json \
              --verify-tag \
              --title "Rill ML ${{ steps.version.outputs.version }}" \
              --generate-notes
          fi
      - name: Move signed stable-index pointer
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view local-ai-stable >/dev/null 2>&1 || \
            gh release create local-ai-stable --title "Rill Local AI stable index" --notes "Machine-readable signed update index."
          gh release upload local-ai-stable dist/stable-index.json --clobber

  publish-python:
    name: Publish Python bindings to PyPI
    if: github.event_name == 'workflow_dispatch'
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pip install maturin
      - name: maturin publish
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
        working-directory: crates/rill-ml-python
        run: |
          if [ -z "${MATURIN_PYPI_TOKEN:-}" ]; then
            echo "MATURIN_PYPI_TOKEN not set — skipping PyPI publish"
            exit 0
          fi
          maturin publish --no-sdist
