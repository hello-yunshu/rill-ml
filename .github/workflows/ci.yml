name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --locked --workspace --all-targets --all-features --exclude rill-ml-python -- -D warnings

  test:
    name: test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo check workspace
        run: cargo check --locked --workspace --all-targets --all-features
      - name: cargo test workspace
        run: cargo test --locked --workspace --all-targets --all-features --exclude rill-ml-python
      - name: cargo test docs
        run: cargo test --locked --workspace --doc --all-features --exclude rill-ml-python

  msrv:
    name: MSRV (1.85) lib check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo +1.85 check rill-ml --lib
        run: cargo +1.85.0 check --locked --lib
      - name: cargo +1.85 check rill-ml --lib --features serde
        run: cargo +1.85.0 check --locked --lib --features serde
      - name: cargo +1.85 check rill-handler-api
        run: cargo +1.85.0 check --locked -p rill-handler-api
      - name: cargo +1.85 check rill-runtime-protocol
        run: cargo +1.85.0 check --locked -p rill-runtime-protocol
      - name: cargo +1.85 check rill-runtime (default features)
        run: cargo +1.85.0 check --locked -p rill-runtime
      - name: cargo +1.85 check rill-runtime (wasm feature)
        run: cargo +1.85.0 check --locked -p rill-runtime --features wasm

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc --features serde --no-deps
        run: cargo doc --locked --features serde --no-deps

  release-index-helpers:
    name: release-index helper tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Verify model/runtime index update behavior
        run: python3 -m unittest discover -s scripts/tests -v

  wasm-build:
    name: WASM build + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked -p rill-ml-wasm --target wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: wasm-pack test (--node)
        run: cd crates/rill-ml-wasm && wasm-pack test --node --release

  wasm-handler:
    name: WASM handler component build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-tools
        run: cargo install wasm-tools --locked
      - name: Build echo handler component
        run: |
          cd handlers/echo-handler
          cargo build --release --target wasm32-unknown-unknown
          mkdir -p ../../target
          wasm-tools component new \
            target/wasm32-unknown-unknown/release/echo-handler.wasm \
            -o ../../target/echo-handler.wasm
      - name: Run WASM handler integration tests
        env:
          ECHO_HANDLER_WASM: ${{ github.workspace }}/target/echo-handler.wasm
        run: cargo test --locked -p rill-runtime --features wasm --test wasm_handler -- --include-ignored

  python-build:
    name: Python bindings build + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build and test Python bindings
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install maturin pytest
          cd crates/rill-ml-python
          maturin develop --release
          pytest tests/ -v
