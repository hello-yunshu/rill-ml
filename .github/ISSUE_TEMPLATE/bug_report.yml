name: Bug report
description: Report a concrete, reproducible issue with RillML.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in the
        sections below. The more precise you are, the faster we can
        reproduce and fix it.

        Before opening a new bug, please search existing issues to avoid
        duplicates.

  - type: input
    id: rillml-version
    attributes:
      label: RillML version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust toolchain version
      placeholder: "rustc 1.85.0 (stable)"
      description: Output of `rustc --version`.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: features
    attributes:
      label: Features enabled
      description: Which cargo features were active when the bug appeared?
      multiple: true
      options:
        - default (no features)
        - serde
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        The smallest self-contained example that reproduces the issue.
        Use a code block. Include the exact `Cargo.toml` snippet if a
        feature flag is needed.
      value: |
        ```toml
        # Cargo.toml
        [dependencies]
        rill-ml = { version = "0.1", features = ["serde"] }
        ```

        ```rust
        // main.rs or test
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include full error messages or panics.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant (workarounds tried, related issues).
